# Extra autostart processes
exec-once = bash ~/.config/hypr/monitor-auto-off.sh

# Force balanced power profile at login. Omarchy's default autostart runs
# `omarchy-powerprofiles-init`, which sets performance whenever on AC. This
# runs after it (user autostart is sourced last) to keep it always balanced.
exec-once = sleep 4 && powerprofilesctl set balanced
